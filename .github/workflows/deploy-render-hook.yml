# Optional: fires Render Deploy Hook after each push to main.
# Fully automatic redeploy ALSO works via Render Dashboard → Settings → Auto-Deploy.
#
# Setup (once):
# Render → Service → Manage → Deploy Hook → Generate & copy URL
# GitHub → Repo → Settings → Secrets and variables → Actions → New secret
#   Name: RENDER_DEPLOY_HOOK_URL   Value: (paste hook URL — never commit)
#
# Leave the secret unset to skip this job (won't fail the workflow).

name: Trigger Render deploy

on:
  push:
    branches: [main]

concurrency:
  group: render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify-render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST deploy hook (if configured)
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          set -e
          if [ -z "${HOOK_URL}" ]; then
            echo "::notice title=Render hook::RENDER_DEPLOY_HOOK_URL not set — skipped. Enable Auto-Deploy in Render Dashboard for push-based deploys without this workflow."
            exit 0
          fi
          echo "Calling Render deploy hook…"
          curl -fsSL -m 120 -X POST "$HOOK_URL"
          echo "Done."
