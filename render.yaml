# Render blueprint — connect repo once; turn on Auto-Deploy for `main` in the dashboard.
# REGOLO_API_KEY: set only in Render Environment (never in Git). Docs: DEPLOY_PUBLIC_DEMO.md
# Spec: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: sehat-saathi-demo
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: REGOLO_API_KEY
        sync: false
