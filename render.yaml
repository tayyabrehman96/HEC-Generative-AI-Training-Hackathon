# Render blueprint — edit name/branch as needed after connecting the repo:
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: sehat-saathi-demo
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: REGOLO_API_KEY
        sync: false
